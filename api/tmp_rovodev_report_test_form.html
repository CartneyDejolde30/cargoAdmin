<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report System Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        select, textarea, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .result pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .info-box strong {
            color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Report System Test</h1>
            <p>Test the reporting functionality</p>
        </div>
        
        <div class="content">
            <div class="info-box">
                <strong>📋 Test Instructions:</strong><br>
                Fill in the form below to test report submission. This simulates the Flutter app sending a report.
            </div>

            <form id="reportForm">
                <div class="form-group">
                    <label>Reporter ID:</label>
                    <select name="reporter_id" required>
                        <option value="1">User 1 - Cartney Dejolde jr</option>
                        <option value="4">User 4</option>
                        <option value="5">User 5</option>
                        <option value="7">User 7</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Report Type:</label>
                    <select name="report_type" required>
                        <option value="car">Car</option>
                        <option value="motorcycle">Motorcycle</option>
                        <option value="user">User</option>
                        <option value="booking">Booking</option>
                        <option value="chat">Chat</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Reported ID (e.g., Car ID):</label>
                    <select name="reported_id" required>
                        <option value="3">Car 3 - Audi A3</option>
                        <option value="5">Car 5</option>
                        <option value="10">Car 10</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Reason:</label>
                    <select name="reason" required>
                        <option value="Misleading information">Misleading information</option>
                        <option value="Fake photos">Fake photos</option>
                        <option value="Vehicle not as described">Vehicle not as described</option>
                        <option value="Safety concerns">Safety concerns</option>
                        <option value="Suspicious pricing">Suspicious pricing</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Details (min 20 characters):</label>
                    <textarea name="details" required placeholder="Describe the issue in detail...">This is a test report submission to verify that the reporting system is working correctly. The details must be at least 20 characters long.</textarea>
                </div>

                <div class="form-group">
                    <label>Image (Optional):</label>
                    <input type="file" name="image" accept="image/jpeg,image/png">
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    Submit Test Report
                </button>
            </form>

            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            result.style.display = 'none';
            
            try {
                const formData = new FormData(e.target);
                
                const response = await fetch('submit_report.php', {
                    method: 'POST',
                    body: formData
                });
                
                const text = await response.text();
                let data;
                
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('Invalid JSON response: ' + text);
                }
                
                result.className = 'result ' + (data.status === 'success' ? 'success' : 'error');
                result.innerHTML = `
                    <strong>${data.status === 'success' ? '✅ Success!' : '❌ Error'}</strong><br>
                    ${data.message || 'No message'}
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                result.style.display = 'block';
                
                if (data.status === 'success') {
                    e.target.reset();
                }
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `
                    <strong>❌ Error</strong><br>
                    ${error.message}
                `;
                result.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Test Report';
            }
        });
    </script>
</body>
</html>
